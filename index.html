<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
	<link rel="icon" type="image/png" href="icon2.png" />
    <title>Secure Password Generator</title>
</head>
<body>
    <main class="container">
        <h1>Password Generator</h1>
        <div class="generator-card">
            <div class="display-group">
                <input type="text" id="password-display" readonly aria-label="Generated Password" />
                <button id="copy-btn" aria-label="Copy to clipboard">Copy</button>
            </div>

            <div class="controls-group">
                <div class="range-group">
                    <label for="length-slider">Length: <span id="length-val">12</span></label>
                    <input type="range" id="length-slider" min="8" max="32" value="12" />
                </div>

                <div class="options-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="lowercase-cb" checked />
                        <span>Lowercase (a-z)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="uppercase-cb" checked />
                        <span>Uppercase (A-Z)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="numbers-cb" checked />
                        <span>Numbers (0-9)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="symbols-cb" />
                        <span>Symbols (!@#$%)</span>
                    </label>
                </div>
            </div>

            <button id="generate-btn" class="generate-btn">Generate Password</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
